openapi: 3.0.3
info:
  title: Travel Management System API
  version: 1.0.0
  description: Comprehensive API for managing users, trips, bookings, approvals, expenses, policies, suppliers, and reporting in a travel management system.
  contact:
    name: API Team
    email: team@example.com
servers:
  - url: https://api.example.com/v1
    description: Production server
  - url: https://sandbox.api.example.com/v1
    description: Sandbox server
tags:
  - name: Auth
    description: Authentication and token lifecycle
  - name: Users
    description: User profile and traveler directory operations
  - name: Trips
    description: Trip planning and lifecycle operations
  - name: Bookings
    description: Flight, hotel, rail, and car booking operations
  - name: Approvals
    description: Approval workflow for trip requests
  - name: Expenses
    description: Expense and receipt management
  - name: Policies
    description: Travel policy rules and violation insights
  - name: Suppliers
    description: Supplier and inventory search operations
  - name: Reports
    description: Operational and spend reporting
security:
  - apiKeyAuth: []
paths:
  /auth/token:
    post:
      operationId: create-auth-token
      summary: Create access token
      description: Exchange user credentials for access and refresh tokens.
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Token generated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /users:
    get:
      operationId: list-users
      summary: List users
      description: Retrieve users filtered by role, status, and department.
      tags:
        - Users
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
        - in: query
          name: role
          schema:
            $ref: '#/components/schemas/UserRole'
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/UserStatus'
        - in: query
          name: department
          schema:
            type: string
      responses:
        '200':
          description: Users retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedUsers'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

    post:
      operationId: create-user
      summary: Create user
      description: Create a user profile for traveler, approver, or administrator.
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreateRequest'
      responses:
        '201':
          description: User created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /users/{userId}:
    get:
      operationId: get-user-by-id
      summary: Get user
      description: Retrieve a specific user profile.
      tags:
        - Users
      parameters:
        - $ref: '#/components/parameters/userId'
      responses:
        '200':
          description: User retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

    patch:
      operationId: update-user-by-id
      summary: Update user
      description: Partially update user profile attributes.
      tags:
        - Users
      parameters:
        - $ref: '#/components/parameters/userId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
      responses:
        '200':
          description: User updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /trips:
    get:
      operationId: list-trips
      summary: List trips
      description: Retrieve trips by traveler, status, and date range.
      tags:
        - Trips
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
        - in: query
          name: travelerId
          schema:
            type: string
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/TripStatus'
        - in: query
          name: startDateFrom
          schema:
            type: string
            format: date
        - in: query
          name: startDateTo
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Trips retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedTrips'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

    post:
      operationId: create-trip
      summary: Create trip
      description: Create a new business trip request.
      tags:
        - Trips
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TripCreateRequest'
      responses:
        '201':
          description: Trip created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Trip'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /trips/{tripId}:
    get:
      operationId: get-trip-by-id
      summary: Get trip
      description: Retrieve trip details including itinerary summary.
      tags:
        - Trips
      parameters:
        - $ref: '#/components/parameters/tripId'
      responses:
        '200':
          description: Trip retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Trip'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

    patch:
      operationId: update-trip-by-id
      summary: Update trip
      description: Update trip-level details such as purpose and dates.
      tags:
        - Trips
      parameters:
        - $ref: '#/components/parameters/tripId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TripUpdateRequest'
      responses:
        '200':
          description: Trip updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Trip'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

    delete:
      operationId: cancel-trip-by-id
      summary: Cancel trip
      description: Cancel a trip that is not already completed.
      tags:
        - Trips
      parameters:
        - $ref: '#/components/parameters/tripId'
      responses:
        '204':
          description: Trip cancelled successfully.
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /trips/{tripId}/itinerary:
    get:
      operationId: get-trip-itinerary
      summary: Get itinerary
      description: Retrieve all segments for a trip itinerary.
      tags:
        - Trips
      parameters:
        - $ref: '#/components/parameters/tripId'
      responses:
        '200':
          description: Itinerary retrieved successfully.
          content:
            application/json:
              schema:
                type: object
                required:
                  - tripId
                  - segments
                properties:
                  tripId:
                    type: string
                  segments:
                    type: array
                    items:
                      $ref: '#/components/schemas/ItinerarySegment'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /trips/{tripId}/submit:
    post:
      operationId: submit-trip-for-approval
      summary: Submit trip
      description: Submit trip for approval workflow execution.
      tags:
        - Trips
        - Approvals
      parameters:
        - $ref: '#/components/parameters/tripId'
      responses:
        '202':
          description: Trip submitted for approval.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalRequest'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /bookings:
    get:
      operationId: list-bookings
      summary: List bookings
      description: Retrieve bookings filtered by trip and booking status.
      tags:
        - Bookings
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
        - in: query
          name: tripId
          schema:
            type: string
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/BookingStatus'
      responses:
        '200':
          description: Bookings retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedBookings'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

    post:
      operationId: create-booking
      summary: Create booking
      description: Create a flight, hotel, rail, or car booking.
      tags:
        - Bookings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingCreateRequest'
      responses:
        '201':
          description: Booking created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /bookings/{bookingId}:
    get:
      operationId: get-booking-by-id
      summary: Get booking
      description: Retrieve booking details.
      tags:
        - Bookings
      parameters:
        - $ref: '#/components/parameters/bookingId'
      responses:
        '200':
          description: Booking retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

    delete:
      operationId: cancel-booking-by-id
      summary: Cancel booking
      description: Cancel an active booking.
      tags:
        - Bookings
      parameters:
        - $ref: '#/components/parameters/bookingId'
      responses:
        '204':
          description: Booking cancelled successfully.
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /approvals:
    get:
      operationId: list-approval-requests
      summary: List approval requests
      description: Retrieve pending and historical approval requests.
      tags:
        - Approvals
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/ApprovalStatus'
        - in: query
          name: approverId
          schema:
            type: string
      responses:
        '200':
          description: Approval requests retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedApprovalRequests'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /approvals/{approvalId}/decision:
    post:
      operationId: decide-approval-request
      summary: Decide approval request
      description: Approve or reject a trip approval request.
      tags:
        - Approvals
      parameters:
        - $ref: '#/components/parameters/approvalId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovalDecisionRequest'
      responses:
        '200':
          description: Approval decision processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalRequest'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /expenses:
    get:
      operationId: list-expenses
      summary: List expenses
      description: Retrieve expenses filtered by trip and reimbursement status.
      tags:
        - Expenses
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
        - in: query
          name: tripId
          schema:
            type: string
        - in: query
          name: reimbursementStatus
          schema:
            $ref: '#/components/schemas/ReimbursementStatus'
      responses:
        '200':
          description: Expenses retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedExpenses'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

    post:
      operationId: create-expense
      summary: Create expense
      description: Submit a travel-related expense with optional receipt references.
      tags:
        - Expenses
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExpenseCreateRequest'
      responses:
        '201':
          description: Expense created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Expense'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /expenses/{expenseId}:
    get:
      operationId: get-expense-by-id
      summary: Get expense
      description: Retrieve details of a single expense.
      tags:
        - Expenses
      parameters:
        - $ref: '#/components/parameters/expenseId'
      responses:
        '200':
          description: Expense retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Expense'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

    patch:
      operationId: update-expense-by-id
      summary: Update expense
      description: Update mutable fields of a submitted expense.
      tags:
        - Expenses
      parameters:
        - $ref: '#/components/parameters/expenseId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExpenseUpdateRequest'
      responses:
        '200':
          description: Expense updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Expense'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /policies:
    get:
      operationId: list-policies
      summary: List policies
      description: Retrieve active travel policies and rules.
      tags:
        - Policies
      responses:
        '200':
          description: Policies retrieved successfully.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Policy'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

    post:
      operationId: create-policy
      summary: Create policy
      description: Create a travel policy rule set.
      tags:
        - Policies
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PolicyCreateRequest'
      responses:
        '201':
          description: Policy created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Policy'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /suppliers/search:
    get:
      operationId: search-suppliers
      summary: Search suppliers
      description: Search supplier inventory by type, destination, and date.
      tags:
        - Suppliers
      parameters:
        - in: query
          name: supplierType
          required: true
          schema:
            $ref: '#/components/schemas/SupplierType'
        - in: query
          name: destinationCode
          required: true
          schema:
            type: string
        - in: query
          name: checkInDate
          schema:
            type: string
            format: date
        - in: query
          name: checkOutDate
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Supplier search completed.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SupplierOffer'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /reports/spend:
    get:
      operationId: get-spend-report
      summary: Get spend report
      description: Retrieve aggregate spend metrics grouped by period and dimension.
      tags:
        - Reports
      parameters:
        - in: query
          name: fromDate
          required: true
          schema:
            type: string
            format: date
        - in: query
          name: toDate
          required: true
          schema:
            type: string
            format: date
        - in: query
          name: groupBy
          schema:
            type: string
            enum:
              - department
              - traveler
              - supplier
              - category
              - month
      responses:
        '200':
          description: Spend report generated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpendReport'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

components:
  parameters:
    page:
      in: query
      name: page
      description: Zero-based page index.
      schema:
        type: integer
        minimum: 0
        default: 0
    size:
      in: query
      name: size
      description: Page size.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    userId:
      in: path
      name: userId
      required: true
      schema:
        type: string
    tripId:
      in: path
      name: tripId
      required: true
      schema:
        type: string
    bookingId:
      in: path
      name: bookingId
      required: true
      schema:
        type: string
    approvalId:
      in: path
      name: approvalId
      required: true
      schema:
        type: string
    expenseId:
      in: path
      name: expenseId
      required: true
      schema:
        type: string

  responses:
    BadRequestError:
      description: Bad request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: BAD_REQUEST
            message: Invalid request payload or parameters
    UnauthorizedError:
      description: Unauthorized. Missing or invalid API credentials.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: UNAUTHORIZED
            message: Missing or invalid API key
    NotFoundError:
      description: Requested resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: NOT_FOUND
            message: Resource does not exist
    InternalServerError:
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: INTERNAL_ERROR
            message: Unexpected failure

  schemas:
    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          example: BAD_REQUEST
        message:
          type: string
          example: Validation failed

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    TokenResponse:
      type: object
      required:
        - accessToken
        - refreshToken
        - tokenType
        - expiresIn
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        tokenType:
          type: string
          enum:
            - Bearer
        expiresIn:
          type: integer
          description: Expiry in seconds.
          example: 3600

    UserRole:
      type: string
      enum:
        - traveler
        - approver
        - travel_manager
        - finance_admin
        - system_admin

    UserStatus:
      type: string
      enum:
        - active
        - inactive

    User:
      type: object
      required:
        - id
        - email
        - firstName
        - lastName
        - role
        - status
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        role:
          $ref: '#/components/schemas/UserRole'
        status:
          $ref: '#/components/schemas/UserStatus'
        department:
          type: string
        costCenter:
          type: string

    UserCreateRequest:
      type: object
      required:
        - email
        - firstName
        - lastName
        - role
      properties:
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        role:
          $ref: '#/components/schemas/UserRole'
        department:
          type: string
        costCenter:
          type: string

    UserUpdateRequest:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        status:
          $ref: '#/components/schemas/UserStatus'
        department:
          type: string
        costCenter:
          type: string

    TripStatus:
      type: string
      enum:
        - draft
        - submitted
        - approved
        - rejected
        - booked
        - in_progress
        - completed
        - cancelled

    Money:
      type: object
      required:
        - currency
        - amount
      properties:
        currency:
          type: string
          minLength: 3
          maxLength: 3
          example: USD
        amount:
          type: number
          format: double
          minimum: 0

    ItinerarySegment:
      type: object
      required:
        - segmentType
        - startDateTime
        - endDateTime
        - origin
        - destination
      properties:
        segmentType:
          type: string
          enum:
            - flight
            - hotel
            - rail
            - car
        startDateTime:
          type: string
          format: date-time
        endDateTime:
          type: string
          format: date-time
        origin:
          type: string
        destination:
          type: string
        bookingId:
          type: string

    Trip:
      type: object
      required:
        - id
        - travelerId
        - purpose
        - startDate
        - endDate
        - destination
        - status
      properties:
        id:
          type: string
        travelerId:
          type: string
        purpose:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        destination:
          type: string
        status:
          $ref: '#/components/schemas/TripStatus'
        estimatedCost:
          $ref: '#/components/schemas/Money'
        policyViolations:
          type: array
          items:
            type: string

    TripCreateRequest:
      type: object
      required:
        - travelerId
        - purpose
        - startDate
        - endDate
        - destination
      properties:
        travelerId:
          type: string
        purpose:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        destination:
          type: string
        estimatedCost:
          $ref: '#/components/schemas/Money'

    TripUpdateRequest:
      type: object
      properties:
        purpose:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        destination:
          type: string

    BookingType:
      type: string
      enum:
        - flight
        - hotel
        - rail
        - car

    BookingStatus:
      type: string
      enum:
        - pending
        - confirmed
        - ticketed
        - cancelled
        - failed

    Booking:
      type: object
      required:
        - id
        - tripId
        - bookingType
        - supplierName
        - status
      properties:
        id:
          type: string
        tripId:
          type: string
        bookingType:
          $ref: '#/components/schemas/BookingType'
        supplierName:
          type: string
        status:
