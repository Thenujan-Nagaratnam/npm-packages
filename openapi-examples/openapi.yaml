openapi: 3.0.3
info:
  title: Simple API
  description: A basic example API
  version: 1.0.0

servers:
  - url: https://api.example.com

paths:
  /hello:
    get:
      summary: Say hello
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Hello, world!

  /users/{id}:
    get:
      summary: Get a user by ID
      parameters:
        - name: id
          in: path
          required: true
          description: User ID
          schema:
            type: integer
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  name:
                    type: string
                    example: John Doe
        '404':
          description: User not found